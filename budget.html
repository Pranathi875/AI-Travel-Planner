    <section class="hero text-center">
        <div class="container">
            <h1 class="display-4"><i class="fas fa-money-bill-wave"></i> Budget Breakdown</h1>
            <p class="lead">Detailed cost analysis for your trip</p>
        </div>
    </section>

    <div class="container my-5">
        <div class="section-card">
            <h2 class="section-title"><i class="fas fa-money-bill-wave"></i> Budget Breakdown</h2>
            <div id="budgetBreakdown"></div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2023 AI Travel Planner. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const destination = getQueryParam('destination');
        const totalBudget = parseFloat(getQueryParam('budget'));
        const numDays = parseInt(getQueryParam('days'));
        const numPeople = parseInt(getQueryParam('people'));
        const travelDates = getQueryParam('dates');
        const foodPreference = getQueryParam('food');
        const accommodationPreference = getQueryParam('accommodation');

        const placesData = {
            "agra": {

                "transport_cost_per_day": 250,
                "entry_tickets": 90,
                "buffer": 1000
            },
            "delhi": {
                "stay_cost_per_night": 800,
                "food_cost_per_meal": 150,
                "transport_cost_per_day": 300,

                "buffer": 1500
            },
            "jaipur": {
                "stay_cost_per_night": 650,

                "entry_tickets": 600,
                "buffer": 1200
            },
            "mumbai": {
                "stay_cost_per_night": 900,
                "food_cost_per_meal": 180,
                "transport_cost_per_day": 350,

                "buffer": 2000
            },
            "goa": {
                "stay_cost_per_night": 1000,

                "entry_tickets": 100,
                "buffer": 1800
            },
            "kerala": {
                "stay_cost_per_night": 750,
                "food_cost_per_meal": 140,
                "transport_cost_per_day": 320,
                "entry_tickets": 200,
                "buffer": 1400
            },
            "bangalore": {
                "stay_cost_per_night": 700,
                "food_cost_per_meal": 160,
                "transport_cost_per_day": 300,
                "entry_tickets": 200,
                "buffer": 1300
            },
            "chennai": {
                "stay_cost_per_night": 650,
                "food_cost_per_meal": 130,

                "entry_tickets": 300,
                "buffer": 1100
            },
            "hyderabad": {
                "stay_cost_per_night": 680,
                "food_cost_per_meal": 135,
                "transport_cost_per_day": 260,
                "entry_tickets": 400,
                "buffer": 1200
            },
            "kolkata": {
                "stay_cost_per_night": 600,
                "food_cost_per_meal": 125,
                "transport_cost_per_day": 240,
                "entry_tickets": 250,
                "buffer": 1000
            },
            "pune": {
                "stay_cost_per_night": 670,
                "food_cost_per_meal": 140,
                "transport_cost_per_day": 280,
                "entry_tickets": 200,
                "buffer": 1150
            },
            "ahmedabad": {
                "stay_cost_per_night": 630,
                "food_cost_per_meal": 120,
                "transport_cost_per_day": 230,
                "entry_tickets": 300,
                "buffer": 1050
            },
            "lucknow": {
                "stay_cost_per_night": 640,
                "food_cost_per_meal": 130,
                "transport_cost_per_day": 250,
                "entry_tickets": 250,
                "buffer": 1100
            },
            "udaipur": {
                "stay_cost_per_night": 720,
                "food_cost_per_meal": 145,
                "transport_cost_per_day": 290,

                "buffer": 1300
            },
            "varanasi": {
                "stay_cost_per_night": 600,

                "transport_cost_per_day": 220,

            },
            "shimla": {
                "stay_cost_per_night": 800,
                "food_cost_per_meal": 150,
                "transport_cost_per_day": 300,
                "entry_tickets": 200,
                "buffer": 1400
            },
            "manali": {
                "stay_cost_per_night": 900,
                "food_cost_per_meal": 180,
                "transport_cost_per_day": 350,
                "entry_tickets": 300,
                "buffer": 1600
            },
            "amritsar": {
                "stay_cost_per_night": 700,
                "food_cost_per_meal": 140,
                "transport_cost_per_day": 280,
                "entry_tickets": 100,
                "buffer": 1200
            },
            "rishikesh": {
                "stay_cost_per_night": 750,
                "food_cost_per_meal": 140,
                "transport_cost_per_day": 300,
                "entry_tickets": 200,
                "buffer": 1300
            }
        };

        function generatePlan(destination, totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference) {
            let data = placesData[destination.toLowerCase()];
            let isGeneric = false;
            if (!data) {
                data = {
                    stay_cost_per_night: 700,
                    food_cost_per_meal: 130,
                    transport_cost_per_day: 250,
                    entry_tickets: 300,
                    buffer: 1200
                };
                isGeneric = true;
            }

            const stayCostPerNight = data.stay_cost_per_night;
            const foodCostPerMeal = data.food_cost_per_meal;
            const transportCostPerDay = data.transport_cost_per_day;
            const entryTickets = data.entry_tickets;
            const buffer = data.buffer;

            const totalStay = stayCostPerNight * numDays * numPeople;
            const totalFood = foodCostPerMeal * 3 * numDays * numPeople;
            const totalTransport = transportCostPerDay * numDays * numPeople;
            const totalTickets = entryTickets;
            const totalBuffer = buffer;
            const totalEstimated = totalStay + totalFood + totalTransport + totalTickets + totalBuffer;

            document.getElementById('budgetBreakdown').innerHTML = `
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Cost</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Stay</td>
                            <td>₹${totalStay}</td>
                            <td>₹${stayCostPerNight} per night per person</td>
                        </tr>
                        <tr>
                            <td>Food</td>
                            <td>₹${totalFood}</td>
                            <td>₹${foodCostPerMeal} per meal per person</td>
                        </tr>
                        <tr>
                            <td>Transportation</td>
                            <td>₹${totalTransport}</td>
                            <td>₹${transportCostPerDay} per day per person</td>
                        </tr>
                        <tr>
                            <td>Entry Tickets</td>
                            <td>₹${totalTickets}</td>
                            <td>Total for attractions</td>
                        </tr>
                        <tr>
                            <td>Buffer</td>
                            <td>₹${totalBuffer}</td>
                            <td>Extra expenses</td>
                        </tr>
                        <tr class="table-primary">
                            <td><strong>Total Estimated</strong></td>
                            <td><strong>₹${totalEstimated}</strong></td>
                            <td>${totalEstimated <= totalBudget ? 'Within budget' : 'Exceeds budget'}</td>
                        </tr>
                    </tbody>
                </table>
                ${totalEstimated > totalBudget ? '<div class="alert alert-warning">Warning: Estimated cost exceeds budget.<br>Alternative plans:<br>- Reduce stay quality: Switch to hostels (save ₹200-400 per night per person).<br>- Use overnight travel: Take night buses to save on accommodation.<br>- Prioritize must-visit places: Skip less famous attractions.</div>' : ''}
                ${isGeneric ? '<div class="alert alert-info">Note: This is a generic plan for ' + destination + '. For more accurate details, consider popular attractions in the area.</div>' : ''}
            `;
        }

        generatePlan(destination, totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
    </script>
</body>
</html>
