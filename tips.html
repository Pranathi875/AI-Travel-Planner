    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const destination = getQueryParam('destination');
        const totalBudget = parseFloat(getQueryParam('budget'));
        const numDays = parseInt(getQueryParam('days'));
        const numPeople = parseInt(getQueryParam('people'));
        const travelDates = getQueryParam('dates');
        const foodPreference = getQueryParam('food');
        const accommodationPreference = getQueryParam('accommodation');

        if (destination === 'agra') {
            generatePlanAgra(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'delhi') {
            generatePlanDelhi(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'jaipur') {
            generatePlanJaipur(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'mumbai') {
            generatePlanMumbai(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'goa') {
            generatePlanGoa(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'kerala') {
            generatePlanKerala(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'bangalore') {
            generatePlanBangalore(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'chennai') {
            generatePlanChennai(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'hyderabad') {
            generatePlanHyderabad(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'kolkata') {
            generatePlanKolkata(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'pune') {
            generatePlanPune(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'ahmedabad') {
            generatePlanAhmedabad(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'lucknow') {
            generatePlanLucknow(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'udaipur') {
            generatePlanUdaipur(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else if (destination === 'varanasi') {
            generatePlanVaranasi(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference);
        } else {
            document.body.innerHTML = '<p class="text-danger text-center mt-5">Sorry, I don\'t have data for ' + destination + ' yet. Supported destinations: Agra, Delhi, Jaipur, Mumbai, Goa, Kerala, Bangalore, Chennai, Hyderabad, Kolkata, Pune, Ahmedabad, Lucknow, Udaipur, Varanasi.</p>';
        }

        function generatePlanAgra(totalBudget, numDays, numPeople, travelDates, foodPreference, accommodationPreference) {
            document.getElementById('tips').innerHTML = `
                <ul>
                    <li>Visit during off-peak hours for free entry sometimes.</li>
                    <li>Use government buses.</li>
                </ul>
            `;
        }
