    <script>
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const destination = getQueryParam('destination');
        const totalBudget = parseFloat(getQueryParam('budget'));
        const numDays = parseInt(getQueryParam('days'));
        const numPeople = parseInt(getQueryParam('people'));
        const travelDates = getQueryParam('dates');
        const foodPreference = getQueryParam('food');
        const accommodationPreference = getQueryParam('accommodation');

        // Data for all destinations
        const placesData = {

            },

            },
            "shimla": {

                    "Day 1: Mall Road, Ridge, Christ Church.",
                    "Day 2: Jakhoo Temple, Summer Hill.",
                    "Day 3: Kufri day trip."

            },
            "manali": {
                "itinerary": [
                    "Day 1: Hadimba Temple, Vashisht Hot Springs.",
                    "Day 2: Rohtang Pass day trip.",
                    "Day 3: Solang Valley, adventure activities."
                ]
            },
            "amritsar": {
                "itinerary": [
                    "Day 1: Golden Temple, Jallianwala Bagh.",
                    "Day 2: Wagah Border ceremony.",
                    "Day 3: Ram Bagh Garden, markets."
                ]
            },
            "rishikesh": {
                "itinerary": [
                    "Day 1: Laxman Jhula, Beatles Ashram.",
                    "Day 2: Rafting in Ganges.",
                    "Day 3: Neer Garh Waterfall, meditation."
                ]
            }
        };

        function generateItinerary(destination, numDays) {
            const data = placesData[destination.toLowerCase()];
            let itinerary = [];
            let isGeneric = false;
            
            if (data && data.itinerary) {
                itinerary = data.itinerary;
            } else {
                // Generic itinerary for unknown destinations
                itinerary = [
                    "Day 1: Explore main attractions and landmarks.",
                    "Day 2: Visit nearby historical sites and markets.",
                    "Day 3: Relax and enjoy local culture."
                ];
                isGeneric = true;
            }

            let html = '';
            for (let i = 0; i < Math.min(numDays, itinerary.length); i++) {
                html += `
                    <div class="itinerary-day">
                        <strong>${itinerary[i]}</strong>
                        <ul>
                            <li><strong>Best timing:</strong> ${i === 0 ? 'Morning (9 AM - 12 PM) for main attractions' : i === 1 ? 'Afternoon (1 PM - 5 PM) for excursions' : 'Evening for relaxation'}</li>
                            <li>Explore local culture and cuisine.</li>
                        </ul>
                    </div>
                `;
            }
            if (numDays > itinerary.length) {
                for (let i = itinerary.length; i < numDays; i++) {
                    html += `
                        <div class="itinerary-day">
                            <strong>Day ${i + 1}: Free exploration and relaxation</strong>
                            <ul>
                                <li>Visit nearby markets or parks.</li>
                                <li>Enjoy local food and shopping.</li>
                            </ul>
                        </div>
                    `;
                }
            }
            
            if (isGeneric) {
                html += '<div class="alert alert-info mt-3">Note: This is a generic itinerary for ' + destination + '. For more accurate details, consider popular attractions in the area.</div>';
            }
            
            document.getElementById('itinerary').innerHTML = html;
        }

        generateItinerary(destination, numDays);
    </script>
</body>
